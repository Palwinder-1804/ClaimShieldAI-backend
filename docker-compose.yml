version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: claimshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: quay.io/minio/minio:latest
    container_name: claimshield-minio
    ports:
      - "9000:9000"  # API Port
      - "9001:9001"  # Console Port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: claimshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - redis
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: claimshield-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

volumes:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
